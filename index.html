<html>

<head>
    <meta charset="UTF-8">
    <title>OUKETI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    {# <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        #MotsCles,
        #MotsChoisis {
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        button {
            margin: 5px;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background-color: #4444ff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #3333dd;
        }

        #debug {
            width: 90%;
            height: 200px;
            margin: 20px auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        hr {
            border: none;
            height: 1px;
            background-color: #ccc;
            margin: 20px 0;
        }
    </style> #}
    <script>
        // éléments de l'interface
        var debug, DIV_MotsCles, DIV_MotsChoisis;
        var TousLesMotsCles = [];
        var MotsCles = [];
        var MotsChoisis = [];

        function clearDebug() { if (debug) debug.value = ""; }
        function write() { if (!debug) return; debug.value += Array.from(arguments).join(" "); }
        function writeln() { if (!debug) return; debug.value += Array.from(arguments).join(" ") + "\n"; }

        function BODY_OnLoad() {
            debug = document.getElementById("debug");
            DIV_MotsCles = document.getElementById("MotsCles");
            DIV_MotsChoisis = document.getElementById("MotsChoisis");
            // charger le fichier JSON local (JSON_motcles.json)
            fetch("JSON_motcles.json")
                .then(response => {
                    if (!response.ok) throw new Error("Échec du chargement JSON: " + response.status);
                    return response.json();
                })
                .then(json => {
                    // le fichier attendu est un tableau d'objets {id, label}
                    TousLesMotsCles = json.map(item => ({ id: item.id, label: item.label }));
                    init();
                    AfficherDIVsMotsCles();
                    AfficherDIVsMotsChoisis();
                    writeln("JSON chargé :", json.map(i => i.id + ":" + i.label).join(", "));
                })
                .catch(err => writeln("Erreur:", err.message));
        }

        function render() {
            if (!DIV_MotsCles || !DIV_MotsChoisis) return;

            // Mots disponibles (à gauche)
            DIV_MotsCles.innerHTML = '';

            const controlsRow = document.createElement('div');
            controlsRow.className = 'd-flex align-items-center justify-content-between flex-wrap gap-2 mb-3';

            const availableLabel = document.createElement('span');
            availableLabel.className = 'text-uppercase text-muted small fw-semibold';
            availableLabel.textContent = 'Filtres disponibles';
            controlsRow.appendChild(availableLabel);

            const resetBtn = document.createElement('button');
            resetBtn.type = 'button';
            resetBtn.className = 'btn btn-sm btn-outline-secondary';
            resetBtn.textContent = 'Réinitialiser';
            resetBtn.onclick = () => {
                writeln('Mots-clés réinitialisés');
                init();
                render();
            };
            controlsRow.appendChild(resetBtn);

            DIV_MotsCles.appendChild(controlsRow);

            if (!MotsCles.length) {
                const emptyState = document.createElement('div');
                emptyState.className = 'alert alert-warning mb-0';
                emptyState.textContent = 'Tous les mots-clés ont été sélectionnés.';
                DIV_MotsCles.appendChild(emptyState);
            } else {
                const buttonWrapper = document.createElement('div');
                buttonWrapper.className = 'd-flex flex-wrap gap-2';

                MotsCles.forEach((motCle, idx) => {
                    if (!motCle) return;
                    const bouton = document.createElement('button');
                    bouton.type = 'button';
                    bouton.className = 'btn btn-outline-secondary btn-sm';
                    bouton.textContent = '(' + motCle.id + ') ' + (motCle.label || motCle.libelle || '');
                    bouton.dataset.idx = idx;
                    bouton.onclick = button_OnClick;
                    bouton.title = (typeof buildMotCleTooltip === 'function') ? buildMotCleTooltip(motCle) : (motCle.label || motCle.libelle || '');
                    buttonWrapper.appendChild(bouton);
                });

                DIV_MotsCles.appendChild(buttonWrapper);
            }

            // Mots sélectionnés (à droite)
            DIV_MotsChoisis.innerHTML = '';

            if (!MotsChoisis.length) {
                const placeholder = document.createElement('div');
                placeholder.className = 'alert alert-info mb-0';
                placeholder.textContent = 'Aucun mot-clé sélectionné. Sélectionnez des mots-clés ci-dessus pour filtrer les objets.';
                DIV_MotsChoisis.appendChild(placeholder);
            } else {
                const selectionWrapper = document.createElement('div');
                selectionWrapper.className = 'd-flex flex-wrap gap-2 align-items-center';

                const label = document.createElement('span');
                label.className = 'fw-bold me-2';
                label.textContent = 'Filtres actifs :';
                selectionWrapper.appendChild(label);

                MotsChoisis.forEach((motCle, idx) => {
                    if (!motCle) return;

                    const btnGroup = document.createElement('div');
                    btnGroup.className = 'btn-group';
                    btnGroup.role = 'group';

                    const btnLabel = document.createElement('button');
                    btnLabel.type = 'button';
                    btnLabel.className = 'btn btn-primary btn-sm disabled';
                    btnLabel.style.opacity = '1';
                    btnLabel.textContent = motCle.label || motCle.libelle || '';

                    const btnClose = document.createElement('button');
                    btnClose.type = 'button';
                    btnClose.className = 'btn btn-primary btn-sm';
                    btnClose.innerHTML = '&times;';
                    btnClose.dataset.idx = idx;
                    btnClose.onclick = button_OnClick;
                    btnClose.title = 'Retirer ce filtre';

                    btnGroup.appendChild(btnLabel);
                    btnGroup.appendChild(btnClose);
                    selectionWrapper.appendChild(btnGroup);
                });

                DIV_MotsChoisis.appendChild(selectionWrapper);
            }

            // Lancer la recherche/rafraîchissement des résultats si une fonction existe
            if (typeof updateResults === 'function') {
                updateResults();
            } else if (typeof buttonSendOnClick === 'function') {
                // optionnel : déclencher l'envoi automatique des filtres
                // buttonSendOnClick();
            }
        }

        async function updateResults() {
            const container = document.getElementById('resultatsRecherche');
            const motsChoisisIds = MotsChoisis.map(motCle => motCle.id);

            if (motsChoisisIds.length === 0) {
                container.innerHTML = ''; // On vide si rien n'est sélectionné
                return;
            }

            writeln("Recherche pour les IDs : " + motsChoisisIds.join(', '));

            // Petit indicateur de chargement discret si nécessaire, ou on laisse tel quel pour la rapidité
            // container.innerHTML = '...'; 

            try {
                const response = await fetch(`mots_cles.php?search_ids=${motsChoisisIds.join(',')}`);
                if (!response.ok) {
                    throw new Error("Erreur lors de la recherche. Statut: " + response.status);
                }
                const objets = await response.json();
                renderResultats(objets);
            } catch (error) {
                writeln("Erreur recherche : " + error.message);
                container.innerHTML = `<div class="alert alert-danger">Erreur : ${error.message}</div>`;
            }
        }

        function init() {
            MotsCles = TousLesMotsCles.slice(); // copie (références aux objets)
            MotsChoisis = [];
        }

        function AfficherDIVsMotsCles() {
            DIV_MotsCles.innerHTML = '<abbr title="Double-cliquez pour réinitialiser">Mots Clés</abbr> : ';
            var abbrElement = DIV_MotsCles.querySelector('abbr');
            abbrElement.ondblclick = function () {
                writeln("Mots-clés réinitialisés");
                init();
                AfficherDIVsMotsCles();
                AfficherDIVsMotsChoisis();
            };

            for (var i = 0; i < MotsCles.length; i++) {
                var motCle = MotsCles[i];
                if (motCle != null) {
                    const bouton = document.createElement("button");
                    // afficher l'id de l'objet suivi du label
                    bouton.textContent = motCle.id + ' - ' + motCle.label;
                    bouton.dataset.idx = i;
                    bouton.onclick = button_OnClick;
                    DIV_MotsCles.appendChild(bouton);
                }
            }
        }

        function AfficherDIVsMotsChoisis() {
            DIV_MotsChoisis.innerHTML = 'Mots Choisis : ';
            for (var i = 0; i < MotsChoisis.length; i++) {
                var motCle = MotsChoisis[i];
                if (motCle != null) {
                    const bouton = document.createElement("button");
                    // afficher l'id de l'objet suivi du label
                    bouton.textContent = motCle.id + ' - ' + motCle.label;
                    bouton.dataset.idx = i;
                    bouton.onclick = button_OnClick;
                    DIV_MotsChoisis.appendChild(bouton);
                }
            }
        }

        function AfficherID_MotsCles() {
            if (!DIV_MotsCles || !DIV_MotsChoisis) return;
            [DIV_MotsCles, DIV_MotsChoisis].forEach(function (div) {
                var buttons = div.querySelectorAll('button');
                Array.prototype.forEach.call(buttons, function (btn) {
                    if (btn.dataset.idx === undefined) return;
                    var idx = Number(btn.dataset.idx);
                    var arr = (div.id === "MotsCles") ? MotsCles : MotsChoisis;
                    var obj = arr[idx];
                    if (obj) {
                        btn.textContent = obj.id + ' - ' + obj.label;
                    }
                });
            });
        }

        function button_OnClick() {
            const idx = Number(this.dataset.idx);
            const parentId = this.parentElement.id;
            if (parentId === "MotsCles") {
                const item = MotsCles.splice(idx, 1)[0];
                if (item !== undefined) {
                    MotsChoisis.push(item);
                    writeln("MotsCles -> MotsChoisis :", item.id + " " + item.label);
                }
            } else if (parentId === "MotsChoisis") {
                const item = MotsChoisis.splice(idx, 1)[0];
                if (item !== undefined) {
                    MotsCles.push(item);
                    writeln("MotsChoisis -> MotsCles :", item.id + " " + item.label);
                }
            }
            AfficherDIVsMotsCles();
            AfficherDIVsMotsChoisis();
        }

        function FONT_Reinit() {
            writeln("Réinitialisation demandée");
            init();
            AfficherDIVsMotsCles();
            AfficherDIVsMotsChoisis();
        }

        async function buttonSendOnClick() {
            // Utiliser la variable globale de la page : MotsChoisis
            const motsChoisisIds = MotsChoisis.map(motCle => motCle.id);
            writeln("Envoi des mots-clés sélectionnés (IDs) : " + motsChoisisIds.join(', '));

            const container = document.getElementById('resultatsRecherche');
            container.innerHTML = '<div class="text-center"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Chargement...</span></div></div>';

            if (motsChoisisIds.length === 0) {
                container.innerHTML = '<div class="alert alert-warning">Veuillez sélectionner au moins un mot-clé pour lancer la recherche.</div>';
                return;
            }

            try {
                const query = encodeURIComponent(motsChoisisIds.join(','));
                const response = await fetch(`tous_lesmots_cles.php?search_ids=${query}`);
                if (!response.ok) {
                    throw new Error("Erreur lors de la recherche. Statut: " + response.status);
                }
                const objets = await response.json();

                // Si une fonction de rendu existe, l'utiliser ; sinon afficher le JSON brut
                if (typeof renderResultats === 'function') {
                    renderResultats(objets);
                } else {
                    container.innerHTML = '<pre style="white-space:pre-wrap; text-align:left;"></pre>';
                    container.querySelector('pre').textContent = JSON.stringify(objets, null, 2);
                }
            } catch (error) {
                writeln("Erreur recherche : " + error.message);
                container.innerHTML = '<div class="alert alert-danger">Erreur : ' + error.message + '</div>';
            }
        }

        function renderResultats(objets) {
            const container = document.getElementById('resultatsRecherche');
            container.innerHTML = '';

            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';
            table.style.background = '#fff';
            table.style.border = '1px solid #e0e0e0';
            table.style.fontSize = '13px';

            const thead = document.createElement('thead');
            const headRow = document.createElement('tr');

            const headers = ['ID', 'Nom', 'Quantité', 'Type', 'Contenu'];
            headers.forEach(h => {
                const th = document.createElement('th');
                th.textContent = h;
                th.style.textAlign = 'left';
                th.style.padding = '6px 8px';
                th.style.borderBottom = '1px solid #ddd';
                th.style.background = '#fafafa';
                headRow.appendChild(th);
            });
            thead.appendChild(headRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');

            (objets || []).forEach(item => {
                const row = document.createElement('tr');

                // Support various possible field names
                const idVal = item && (item.id || item.ID || item.code || item.key || item.label) || '';
                const nomVal = item && (item.nom || item.name || item.label || item.titre) || '';
                const quantiteVal = item && (typeof item.quantite === 'number' ? item.quantite : (item.quantity || item.qte || 1));
                const estConteneur = !!(item && (item.estConteneur || item.isContainer || item.conteneur));
                const estContenuDans = item && (item.estContenuDans || item.containedIn || item.parentId || item.contenuDans);

                const cells = [
                    idVal,
                    nomVal,
                    quantiteVal,
                    estConteneur ? 'Conteneur' : 'Objet',
                    estContenuDans ? ('Dans #' + estContenuDans) : 'Non contenu'
                ];

                cells.forEach(text => {
                    const td = document.createElement('td');
                    td.textContent = text;
                    td.style.padding = '6px 8px';
                    td.style.borderBottom = '1px solid #eee';
                    td.style.verticalAlign = 'middle';
                    row.appendChild(td);
                });

                tbody.appendChild(row);
            });

            table.appendChild(tbody);
            container.appendChild(table);
        }

    </script>

</head>

<body onload="BODY_OnLoad()">
    <header style="text-align:center; margin-bottom:10px;">
        <h1 style="margin:8px 0;">OUKETI-01</h1>
        <div role="toolbar" aria-label="Actions" style="display:inline-flex; gap:8px; flex-wrap:wrap;">
            <button type="button" onclick="FONT_Reinit()" title="Réinitialiser la liste">Réinitialiser</button>
            <button type="button" onclick="clearDebug()" title="Rafraîchir la zone de texte">Rafraîchir la zone de
                texte</button>
            <button class="btn btn-primary" onclick="buttonSendOnClick()">Envoyer la sélection</button>
            <button type="button" onclick="createMotCleDetailsElement(motCle)"
                title="Afficher les détails du mot-clé">Détails</button>
        </div>
    </header>

    <div class="container mt-4">

        <div class="card mb-4">
            <div id="MotsCles" class="card-body">
            </div>
        </div>

        <div class="card mb-4">
            <div id="MotsChoisis" class="card-body">
            </div>
        </div>

        <div id="resultatsRecherche" class="mt-4"></div>
    </div>


    <hr style="margin:20px 0;">

    <div style="max-width:1000px; margin:0 auto; padding:0 10px;">

        <div style="text-align:center; margin-top:10px;">
            <textarea id="debug" readonly placeholder="" style="width:90%; min-height:200px; padding:10px; font-family:'Courier New', monospace; font-size:14px;
                       border:1px solid #ccc; border-radius:5px; resize:vertical; background-color:#f8f8f8;"
                aria-live="polite" aria-label="Journal de debug"></textarea>
        </div>
    </div>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
