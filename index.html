<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUKETI - Recherche d'objets par mots-clés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --ink-900: #0f172a;
            --ink-700: #334155;
            --ink-500: #64748b;
            --surface-0: #f1f5f9;
            --surface-1: #ffffff;
            --surface-2: #eef2ff;
            --line: #e2e8f0;
            --brand: #0f766e;
            --brand-strong: #115e59;
            --brand-soft: #ccfbf1;
            --danger: #be123c;
            --danger-soft: #ffe4e6;
            --shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Inter", "Trebuchet MS", sans-serif;
            color: var(--ink-900);
            background:
                radial-gradient(circle at 8% 12%, #d1fae5 0, transparent 40%),
                radial-gradient(circle at 92% 6%, #dbeafe 0, transparent 38%),
                linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 24px 0;
        }

        .main-container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .app-header h1 {
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 800;
            letter-spacing: 0.02em;
            margin-bottom: 6px;
            color: #0b3b36;
        }

        .app-header p {
            margin: 0;
            color: var(--ink-700);
            font-size: 1rem;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            background: var(--surface-1);
            overflow: hidden;
        }

        .card-header {
            background: #f8fafc;
            border-bottom: 1px solid var(--line);
            color: var(--ink-900);
            font-weight: 700;
            padding: 14px 18px;
        }

        .card-body {
            padding: 18px;
        }

        .counter-badge {
            background: #e2e8f0;
            color: #0f172a;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        #keywordInput {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: 10px 12px;
        }

        #keywordInput:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 0 0.22rem rgba(20, 184, 166, 0.2);
        }

        #keywordSubmitBtn {
            background: var(--brand);
            border-color: var(--brand);
            border-radius: 12px;
            font-weight: 600;
        }

        #keywordSubmitBtn:hover {
            background: var(--brand-strong);
            border-color: var(--brand-strong);
        }

        #keywordCancelBtn {
            border-radius: 12px;
            font-weight: 600;
        }

        .keyword-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            background: #fcfdff;
            border: 1px solid #dbe2ea;
            border-radius: 14px;
            padding: 8px;
        }

        .keyword-btn {
            margin: 0;
            width: 100%;
            min-height: 42px;
            text-align: left;
            padding: 9px 12px;
            border: 1px solid #cdd8e7;
            border-radius: 10px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            color: var(--ink-900);
            font-size: 0.95rem;
            font-weight: 600;
            transition: transform 0.12s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .keyword-btn:hover {
            transform: translateY(-1px);
            border-color: #14b8a6;
            box-shadow: 0 3px 10px rgba(20, 184, 166, 0.16);
            color: #0b3b36;
        }

        .keyword-actions {
            display: flex;
            gap: 6px;
        }

        .keyword-actions .btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-width: 1px;
        }

        .selected-keyword {
            background: var(--surface-2);
            color: #1e293b;
            border: 1px solid #c7d2fe;
            border-radius: 12px;
            margin: 4px;
            padding: 7px 10px 7px 12px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .selected-keyword .action-mini,
        .selected-keyword .remove-btn {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            border: 1px solid #bfdbfe;
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #1d4ed8;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.16s ease;
        }

        .selected-keyword .action-mini:hover,
        .selected-keyword .remove-btn:hover {
            background: #eff6ff;
        }

        .action-btn {
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 700;
            letter-spacing: 0.01em;
            border: 1px solid transparent;
            transition: transform 0.12s ease, box-shadow 0.16s ease;
        }

        .btn-search {
            background: #0f766e;
            border-color: #0f766e;
            color: #fff;
        }

        .btn-search:hover {
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
            background: #115e59;
            border-color: #115e59;
        }

        .btn-reset {
            background: #fff;
            border-color: #cbd5e1;
            color: #334155;
        }

        .btn-reset:hover {
            background: #f8fafc;
            border-color: #94a3b8;
            color: #0f172a;
        }

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
        }

        .results-table thead th {
            background: #f8fafc;
            color: var(--ink-700);
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 0.76rem;
            border-bottom: 1px solid var(--line);
        }

        .results-table tbody tr:nth-child(even) {
            background: #fcfdff;
        }

        .results-table tbody tr:hover {
            background: #f1f5f9;
        }

        .results-table tbody td {
            padding: 11px 12px;
            border-bottom: 1px solid #eef2f7;
            vertical-align: middle;
        }

        .badge-container {
            background: var(--brand-soft);
            color: #115e59;
            border: 1px solid #99f6e4;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .badge-object {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }

        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: var(--ink-500);
        }

        .empty-state i {
            font-size: 2.4rem;
            margin-bottom: 10px;
            opacity: 0.65;
        }

        #debug {
            width: 100%;
            min-height: 150px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            background: #0b1220;
            color: #34d399;
            border: none;
            border-radius: 0;
            padding: 14px;
            resize: vertical;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.24s ease forwards;
        }

        @media (max-width: 900px) {
            .results-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }

        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
                align-items: stretch !important;
            }

            .action-btn {
                width: 100%;
            }

            .keyword-row {
                grid-template-columns: 1fr;
            }

            .keyword-actions {
                justify-content: flex-end;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <header class="app-header">
            <h1><i class="bi bi-search"></i> OUKETI</h1>
            <p>Recherchez vos objets parmi les mots-clés suivants</p>
            <div class="mt-3">
                <a href="interface-objets.html" class="btn btn-outline-success">
                    <i class="bi bi-box-seam"></i> Aller a l'interface objets
                </a>
            </div>
        </header>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-tags"></i> Mots-clés</span>
                <span class="counter-badge" id="availableCount">0</span>
            </div>
            <div class="card-body">
                <form id="keywordForm" class="row g-2 mb-3">
                    <input type="hidden" id="keywordId">
                    <div class="col-md-8">
                        <input type="text" class="form-control" id="keywordInput" placeholder="Nouveau mot-clé" required maxlength="20">
                    </div>
                    <div class="col-md-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1" id="keywordSubmitBtn">
                            <i class="bi bi-plus-circle"></i> Ajouter
                        </button>
                        <button type="button" class="btn btn-outline-secondary d-none" id="keywordCancelBtn">
                            Annuler
                        </button>
                    </div>
                </form>
                <div id="keywordFeedback"></div>
                <div id="MotsCles">
                    <div class="empty-state">
                        <i class="bi bi-hourglass-split"></i>
                        <p>Chargement des mots-clés...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-check2-circle"></i> Mots choisis</span>
                <span class="counter-badge" id="selectedCount">0</span>
            </div>
            <div class="card-body" id="MotsChoisis">
                <div class="empty-state">
                    <i class="bi bi-hand-index"></i>
                    <p>Cliquez sur les mots-clés pour obtenir des objets</p>
                </div>
            </div>
        </div>

        <div class="d-flex gap-3 justify-content-center flex-wrap mb-4 action-buttons">
            <button class="action-btn btn-search" onclick="buttonSendOnClick()">
                <i class="bi bi-search"></i> Rechercher
            </button>
            <button class="action-btn btn-reset" onclick="resetSelection()">
                <i class="bi bi-arrow-counterclockwise"></i> Réinitialiser
            </button>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="bi bi-list-ul"></i> Résultats
            </div>
            <div class="card-body" id="resultatsRecherche">
                <div class="empty-state">
                    <i class="bi bi-inbox"></i>
                    <p>Sélectionnez des mots-clés et cliquez sur "Rechercher"</p>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header d-flex justify-content-between align-items-center" 
                 style="cursor:pointer" data-bs-toggle="collapse" data-bs-target="#debugCollapse">
                <span><i class="bi bi-terminal"></i> Debogage</span>
                <i class="bi bi-chevron-down"></i>
            </div>
            <div class="collapse" id="debugCollapse">
                <textarea id="debug" readonly placeholder="Les logs apparaîtront ici..."></textarea>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        let debug, DIV_MotsCles, DIV_MotsChoisis;
        let keywordForm, keywordInput, keywordId, keywordSubmitBtn, keywordCancelBtn, keywordFeedback;
        let TousLesMotsCles = [];
        let MotsCles = [];
        let MotsChoisis = [];
        const LOCAL_OBJECTS_STORAGE_KEY = 'objets.interface.v1';

        function clearDebug() { if (debug) debug.value = ""; }
        function writeln(...args) { 
            if (debug) {
                const timestamp = new Date().toLocaleTimeString();
                debug.value += `[${timestamp}] ${args.join(" ")}\n`;
                debug.scrollTop = debug.scrollHeight;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            debug = document.getElementById("debug");
            DIV_MotsCles = document.getElementById("MotsCles");
            DIV_MotsChoisis = document.getElementById("MotsChoisis");
            keywordForm = document.getElementById('keywordForm');
            keywordInput = document.getElementById('keywordInput');
            keywordId = document.getElementById('keywordId');
            keywordSubmitBtn = document.getElementById('keywordSubmitBtn');
            keywordCancelBtn = document.getElementById('keywordCancelBtn');
            keywordFeedback = document.getElementById('keywordFeedback');

            keywordForm.addEventListener('submit', onKeywordSubmit);
            keywordCancelBtn.addEventListener('click', resetKeywordForm);

            writeln("Application OUKETI initialisée");
            chargerMotsCles();
        });

        async function chargerMotsCles(conserverSelection = false) {
            try {
                writeln("Chargement des mots-clés...");
                const response = await fetch("gestion_mots_cles.php");
                if (!response.ok) throw new Error(`Erreur HTTP: ${response.status}`);
                
                const json = await response.json();
                TousLesMotsCles = json.map(item => ({
                    id: Number(item.id),
                    label: item.label || item.libelle
                }));

                if (conserverSelection) {
                    synchroniserSelections();
                } else {
                    initMotsCles();
                }

                renderMotsCles();
                renderMotsChoisis();
                writeln(`${TousLesMotsCles.length} mots-clés chargés`);
            } catch (err) {
                writeln(`Erreur: ${err.message}`);
                DIV_MotsCles.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> Impossible de charger les mots-clés: ${err.message}</div>`;
            }
        }

        function initMotsCles() {
            MotsCles = [...TousLesMotsCles];
            MotsChoisis = [];
        }

        function synchroniserSelections() {
            const byId = new Map(TousLesMotsCles.map(m => [m.id, m]));
            MotsChoisis = MotsChoisis.filter(m => byId.has(m.id)).map(m => byId.get(m.id));
            const selectedIds = new Set(MotsChoisis.map(m => m.id));
            MotsCles = TousLesMotsCles.filter(m => !selectedIds.has(m.id));
        }

        function setKeywordFeedback(message, type = 'success') {
            keywordFeedback.innerHTML = `<div class="alert alert-${type} py-2 mb-3">${message}</div>`;
        }

        function resetKeywordForm(clearFeedback = true) {
            keywordId.value = '';
            keywordInput.value = '';
            keywordSubmitBtn.innerHTML = '<i class="bi bi-plus-circle"></i> Ajouter';
            keywordCancelBtn.classList.add('d-none');
            if (clearFeedback) {
                keywordFeedback.innerHTML = '';
            }
        }

        async function onKeywordSubmit(event) {
            event.preventDefault();
            const libelle = keywordInput.value.trim();
            const id = Number(keywordId.value || 0);

            if (!libelle) {
                setKeywordFeedback('Le libelle du mot-cle est obligatoire.', 'warning');
                return;
            }

            try {
                const isEdit = id > 0;
                const response = await fetch('gestion_mots_cles.php', {
                    method: isEdit ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(isEdit ? { id, libelle } : { libelle })
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || 'Erreur lors de la sauvegarde.');
                }

                resetKeywordForm(false);
                setKeywordFeedback(result.message || (isEdit ? 'Mot-cle modifie.' : 'Mot-cle ajoute.'));
                writeln(isEdit ? `Mot-cle modifie: ${libelle}` : `Mot-cle ajoute: ${libelle}`);
                await chargerMotsCles(true);
            } catch (error) {
                setKeywordFeedback(error.message, 'danger');
                writeln(`Erreur CRUD: ${error.message}`);
            }
        }

        function startEditMotCle(id) {
            const motCle = TousLesMotsCles.find(m => m.id === id);
            if (!motCle) return;

            keywordId.value = motCle.id;
            keywordInput.value = motCle.label;
            keywordSubmitBtn.innerHTML = '<i class="bi bi-pencil"></i> Modifier';
            keywordCancelBtn.classList.remove('d-none');
            keywordFeedback.innerHTML = '';
            keywordInput.focus();
            writeln(`✏️ Edition du mot-cle ID ${motCle.id}`);
        }

        async function supprimerMotCle(id) {
            const motCle = TousLesMotsCles.find(m => m.id === id);
            if (!motCle) return;

            if (!confirm(`Supprimer le mot-cle \"${motCle.label}\" ?`)) {
                return;
            }

            try {
                const response = await fetch(`gestion_mots_cles.php?id=${encodeURIComponent(id)}`, {
                    method: 'DELETE'
                });

                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || 'Suppression impossible.');
                }

                resetKeywordForm(false);
                setKeywordFeedback(result.message || 'Mot-cle supprime.');
                writeln(`🗑️ Mot-cle supprime: ${motCle.label}`);
                await chargerMotsCles(true);
            } catch (error) {
                setKeywordFeedback(error.message, 'danger');
                writeln(`❌ Erreur suppression: ${error.message}`);
            }
        }

        function renderMotsCles() {
            DIV_MotsCles.innerHTML = '';
            document.getElementById('availableCount').textContent = MotsCles.length;

            if (MotsCles.length === 0) {
                DIV_MotsCles.innerHTML = `<div class="empty-state"><i class="bi bi-check-all"></i><p>Tous les mots-clés ont été sélectionnés</p></div>`;
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'd-flex flex-column';

            MotsCles.forEach((motCle, idx) => {
                const row = document.createElement('div');
                row.className = 'keyword-row fade-in';
                row.style.animationDelay = `${idx * 0.05}s`;

                const btn = document.createElement('button');
                btn.className = 'keyword-btn';
                btn.innerHTML = `<i class="bi bi-plus-circle"></i> ${motCle.label}`;
                btn.onclick = () => selectionnerMotCle(idx);

                const actions = document.createElement('div');
                actions.className = 'keyword-actions';
                actions.innerHTML = `
                    <button class="btn btn-outline-primary" title="Modifier" onclick="startEditMotCle(${motCle.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger" title="Supprimer" onclick="supprimerMotCle(${motCle.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                `;

                row.appendChild(btn);
                row.appendChild(actions);
                wrapper.appendChild(row);
            });

            DIV_MotsCles.appendChild(wrapper);
        }

        function renderMotsChoisis() {
            DIV_MotsChoisis.innerHTML = '';
            document.getElementById('selectedCount').textContent = MotsChoisis.length;

            if (MotsChoisis.length === 0) {
                DIV_MotsChoisis.innerHTML = `<div class="empty-state"><i class="bi bi-hand-index"></i><p>Cliquez sur les mots-clés ci-dessus pour les sélectionner</p></div>`;
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'd-flex flex-wrap align-items-center';

            MotsChoisis.forEach((motCle, idx) => {
                const badge = document.createElement('span');
                badge.className = 'selected-keyword fade-in';
                badge.innerHTML = `${motCle.label}
                    <button class="action-mini" title="Modifier"><i class="bi bi-pencil"></i></button>
                    <button class="action-mini" title="Supprimer"><i class="bi bi-trash"></i></button>
                    <button class="remove-btn" title="Retirer"><i class="bi bi-x"></i></button>`;
                badge.querySelectorAll('.action-mini')[0].onclick = () => startEditMotCle(motCle.id);
                badge.querySelectorAll('.action-mini')[1].onclick = () => supprimerMotCle(motCle.id);
                badge.querySelector('.remove-btn').onclick = () => retirerMotCle(idx);
                wrapper.appendChild(badge);
            });

            DIV_MotsChoisis.appendChild(wrapper);
        }

        function selectionnerMotCle(idx) {
            const motCle = MotsCles.splice(idx, 1)[0];
            if (motCle) {
                MotsChoisis.push(motCle);
                writeln(`➕ Sélectionné: "${motCle.label}" (ID: ${motCle.id})`);
                renderMotsCles();
                renderMotsChoisis();
            }
        }

        function retirerMotCle(idx) {
            const motCle = MotsChoisis.splice(idx, 1)[0];
            if (motCle) {
                MotsCles.push(motCle);
                MotsCles.sort((a, b) => a.id - b.id);
                writeln(`➖ Retiré: "${motCle.label}" (ID: ${motCle.id})`);
                renderMotsCles();
                renderMotsChoisis();
            }
        }

        function resetSelection() {
            writeln("🔄 Réinitialisation");
            initMotsCles();
            renderMotsCles();
            renderMotsChoisis();
            document.getElementById('resultatsRecherche').innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><p>Sélectionnez des mots-clés et cliquez sur "Rechercher"</p></div>`;
        }

        function normalizeToken(value) {
            return String(value || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim();
        }

        function loadLocalCreatedObjects() {
            try {
                const raw = localStorage.getItem(LOCAL_OBJECTS_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                writeln(`⚠️ Objets locaux ignorés: ${error.message}`);
                return [];
            }
        }

        function buildLocalResults(selectedLabels) {
            const localObjects = loadLocalCreatedObjects();
            if (selectedLabels.length === 0 || localObjects.length === 0) {
                return [];
            }

            const selectedSet = new Set(selectedLabels.map(normalizeToken));

            return localObjects
                .filter(obj => {
                    const keywords = Array.isArray(obj.keywords) ? obj.keywords : [];
                    const keywordSet = new Set(keywords.map(normalizeToken));
                    // Un objet local est retenu si tous les mots-clés sélectionnés sont présents.
                    return [...selectedSet].every(token => keywordSet.has(token));
                })
                .map(obj => ({
                    id: `local-${obj.id}`,
                    nom: obj.name,
                    quantite: 1,
                    estConteneur: false,
                    estContenuDans: null,
                    sourceLocale: true,
                    keywords: obj.keywords
                }));
        }

        async function buttonSendOnClick() {
            const container = document.getElementById('resultatsRecherche');
            const motsChoisisIds = MotsChoisis.map(m => m.id);
            const selectedLabels = MotsChoisis.map(m => m.label);

            if (motsChoisisIds.length === 0) {
                container.innerHTML = `<div class="alert alert-warning"><i class="bi bi-exclamation-circle"></i> Veuillez sélectionner au moins un mot-clé.</div>`;
                writeln("⚠️ Aucun mot-clé sélectionné");
                return;
            }

            writeln(`🔍 Recherche avec IDs: [${motsChoisisIds.join(', ')}]`);
            container.innerHTML = `<div class="text-center p-4"><div class="spinner-border text-primary"></div></div>`;

            try {
                const response = await fetch(`tous_les_mots_cles.php?search_ids=${encodeURIComponent(motsChoisisIds.join(','))}`);
                if (!response.ok) throw new Error(`Erreur serveur: ${response.status}`);
                
                const objetsServeur = await response.json();
                if (objetsServeur.error) throw new Error(objetsServeur.error);

                const objetsLocaux = buildLocalResults(selectedLabels);
                const objets = [...objetsServeur, ...objetsLocaux];
                
                writeln(`✅ ${objets.length} objet(s) trouvé(s) dont ${objetsLocaux.length} local(aux)`);
                renderResultats(objets);
            } catch (error) {
                writeln(`❌ Erreur: ${error.message}`);
                container.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> ${error.message}</div>`;
            }
        }

        function renderResultats(objets) {
            const container = document.getElementById('resultatsRecherche');
            container.innerHTML = '';

            if (!objets || objets.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="bi bi-search"></i><p>Aucun objet ne correspond à ces critères</p></div>`;
                return;
            }

            const imageCatalog = {
                objet: [
                    'Clou rouge en métal.jpg',
                    'Clou vert en métal.jpg',
                    'Marteau jaune en métal.jpg',
                    'Marteau jaune en plastique.jpg',
                    'Marteau vert en métal.jpg',
                    'Marteau vert en plastique.jpg',
                    'pinceau bleu en bois.jpg',
                    'pinceau bleu en plastique.jpg',
                    'pinceau jaune en bois.jpg',
                    'pinceau jaune en plastique.jpg',
                    'pinceau rouge en bois.jpg',
                    'pinceau rouge en plastique.jpg',
                    'pinceau vert en bois.jpg',
                    'pinceau vert en plastique.jpg',
                    'Scie bleu en métal.jpg',
                    'tournevis jaune en plastique.jpg'
                ],
                conteneur: [
                    'boîte-1 rouge en métal.jpg',
                    'boîte-2 bleue en bois.jpg',
                    'boîte-2 bleue en métal.jpg',
                    'boîte-2 verte en bois.jpg',
                    'boîte-2 verte en métal.jpg'
                ]
            };

            const colorAliases = {
                jaune: 'jaune',
                rouge: 'rouge',
                bleu: 'bleu',
                bleue: 'bleu',
                vert: 'vert',
                verte: 'vert'
            };

            function normalizeText(value) {
                return String(value || '')
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/[^a-z0-9]+/g, ' ')
                    .trim();
            }

            function canonicalColor(value) {
                return colorAliases[normalizeText(value)] || null;
            }

            function findSelectedConstraint() {
                const selected = MotsChoisis.map(m => normalizeText(m.label));
                const material = selected.find(v => ['metal', 'plastique', 'bois'].includes(v)) || null;
                const color = selected.map(canonicalColor).find(Boolean) || null;
                return { material, color };
            }

            function getImageForObjet(item) {
                if (!item || !item.nom) return null;

                const folder = item.estConteneur ? 'conteneur' : 'objet';
                const candidates = imageCatalog[folder] || [];
                const nomNorm = normalizeText(item.nom);
                const { material, color } = findSelectedConstraint();

                const scored = candidates
                    .map(fileName => {
                        const noExt = fileName.replace(/\.jpg$/i, '');
                        const normalized = normalizeText(noExt);
                        if (!normalized.includes(nomNorm)) return null;

                        const tokens = normalized.split(' ');
                        const candidateColor = tokens.map(canonicalColor).find(Boolean);
                        const candidateMaterial = tokens.find(v => ['metal', 'plastique', 'bois'].includes(v)) || null;

                        let score = 1;
                        if (color && candidateColor === color) score += 2;
                        if (material && candidateMaterial === material) score += 2;

                        return { fileName, score };
                    })
                    .filter(Boolean)
                    .sort((a, b) => b.score - a.score);

                return scored.length > 0 ? `images/${folder}/${scored[0].fileName}` : null;
            }

            const table = document.createElement('table');
            table.className = 'results-table';
            table.innerHTML = `
                <thead><tr>
                    <th><i class="bi bi-image"></i> Image</th>
                    <th><i class="bi bi-hash"></i> ID</th>
                    <th><i class="bi bi-box"></i> Nom</th>
                    <th><i class="bi bi-123"></i> Quantité</th>
                    <th><i class="bi bi-tag"></i> Type</th>
                    <th><i class="bi bi-folder"></i> Conteneur</th>
                </tr></thead><tbody></tbody>`;

            const tbody = table.querySelector('tbody');
            objets.forEach((item, i) => {
                const estConteneur = item.estConteneur;
                const estContenuDans = item.estContenuDans;
                const imagePath = getImageForObjet(item);
                const idLabel = item.sourceLocale ? `LOCAL-${String(item.id).replace('local-', '')}` : `#${item.id}`;
                const conteneurLabel = item.sourceLocale
                    ? '<em class="text-muted">Objet local</em>'
                    : (estContenuDans ? `Dans <strong>#${estContenuDans}</strong>` : '<em class="text-muted">Aucun</em>');
                const row = document.createElement('tr');
                row.className = 'fade-in';
                row.style.animationDelay = `${i * 0.05}s`;
                row.innerHTML = `
                    <td style="width: 80px;">
                        ${imagePath 
                                     ? `<img src="${encodeURI(imagePath)}" alt="${item.nom}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                               <div style="display:none; width:60px; height:60px; background:#f0f0f0; border-radius:8px; align-items:center; justify-content:center;"><i class="bi bi-image text-muted"></i></div>`
                            : `<div style="width:60px; height:60px; background:#f0f0f0; border-radius:8px; display:flex; align-items:center; justify-content:center;"><i class="bi bi-image text-muted"></i></div>`
                        }
                    </td>
                    <td><strong>${idLabel}</strong></td>
                    <td>${item.nom || '-'}</td>
                    <td>${item.quantite ?? 1}</td>
                    <td><span class="badge-container ${estConteneur ? '' : 'badge-object'}"><i class="bi bi-${estConteneur ? 'box-seam' : 'circle'}"></i> ${estConteneur ? 'Conteneur' : 'Objet'}</span></td>
                    <td>${conteneurLabel}</td>`;
                tbody.appendChild(row);
            });

            container.appendChild(table);
        }

        function detailsobjet(id) {
            alert(`Détails de l'objet ID: ${id}`);
            
        }

        function detailsconteneur(id) {
            alert(`Détails du conteneur ID: ${id}`);
        }
    </script>
</body>

</html>
